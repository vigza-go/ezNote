<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻记 - 轻量协同笔记</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root, [data-theme="light"] {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-hover: #f0f0f0;
            --bg-active: #e3f2fd;
            --text-primary: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #999;
            --border-color: #e5e5e5;
            --accent-color: #4a90d9;
            --accent-hover: #3a7bc8;
            --danger-color: #e74c3c;
            --toolbar-bg: #fff;
            --toolbar-border: #e0e0e0;
            --toolbar-shadow: rgba(0,0,0,0.08);
            --code-bg: #f5f5f5;
            --blockquote-border: #ddd;
            --blockquote-bg: #f9f9f9;
            --selection-bg: #b4d5fe;
            --cursor-glow: rgba(74,144,217,0.3);
        }

        [data-theme="dark"] {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --bg-hover: #2a2d2e;
            --bg-active: #094771;
            --text-primary: #d4d4d4;
            --text-secondary: #cccccc;
            --text-muted: #858585;
            --border-color: #3c3c3c;
            --accent-color: #007acc;
            --accent-hover: #0066aa;
            --danger-color: #f14c4c;
            --toolbar-bg: #2d2d2d;
            --toolbar-border: #3c3c3c;
            --toolbar-shadow: rgba(0,0,0,0.3);
            --code-bg: #1e1e1e;
            --blockquote-border: #4a4a4a;
            --blockquote-bg: #252526;
            --selection-bg: #094771;
            --cursor-glow: rgba(0,122,204,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        ::selection { background: var(--selection-bg); }

        .app { display: flex; height: 100vh; }

        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .dark-toggle {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .dark-toggle:hover { background: var(--bg-hover); }

        .sidebar-actions { padding: 12px 20px; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .note-item {
            padding: 12px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 2px;
            transition: background 0.15s ease;
        }
        .note-item:hover { background: var(--bg-hover); }
        .note-item.active { background: var(--bg-active); }

        .note-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item-date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .note-item-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 4px;
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            overflow: hidden;
            transition: background 0.3s;
        }

        .editor-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .editor-title-input {
            flex: 1;
            font-size: 20px;
            font-weight: 700;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
        }
        .editor-title-input::placeholder { color: var(--text-muted); }

        .btn-icon {
            background: transparent;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.15s ease;
            flex-shrink: 0;
        }
        .btn-icon:hover { background: var(--bg-hover); color: var(--danger-color); }

        .btn-back { display: none; }
        .btn-back:hover { color: var(--accent-color); }

        .editor-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .editor-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .save-indicator {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .save-indicator.saving { color: var(--accent-color); }
        .save-indicator.saved { color: #27ae60; }

        .online-count {
            font-size: 12px;
            color: var(--accent-color);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }
        .empty-state-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.3; }
        .empty-state-text { font-size: 16px; margin-bottom: 8px; }
        .empty-state-hint { font-size: 14px; }

        .sidebar-empty {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .search-box { padding: 0 20px 12px; }
        .search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--accent-color); }

        mark {
            background: #fff176;
            color: inherit;
            border-radius: 2px;
            padding: 0 1px;
        }

        [data-theme="dark"] mark { background: #9e6a03; color: #d4d4d4; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .toast-undo {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .toast-undo:hover { background: rgba(255,255,255,0.15); }

        /* Tiptap Editor Styles */
        .tiptap-editor {
            outline: none;
            font-size: 16px;
            line-height: 1.75;
            color: var(--text-primary);
        }

        .ProseMirror {
            outline: none;
        }

        .ProseMirror p { margin-bottom: 0.5em; }
        .tiptap-editor p.is-editor-empty:first-child::before {
            content: attr(data-placeholder);
            float: left;
            color: var(--text-muted);
            pointer-events: none;
            height: 0;
        }

        .tiptap-editor h1 { font-size: 1.8em; font-weight: 700; margin: 0.8em 0 0.4em; }
        .tiptap-editor h2 { font-size: 1.5em; font-weight: 700; margin: 0.7em 0 0.3em; }
        .tiptap-editor h3 { font-size: 1.25em; font-weight: 600; margin: 0.6em 0 0.3em; }

        .tiptap-editor ul, .tiptap-editor ol { padding-left: 1.5em; margin-bottom: 0.5em; }
        .tiptap-editor li { margin-bottom: 0.2em; }

        .tiptap-editor blockquote {
            border-left: 3px solid var(--blockquote-border);
            background: var(--blockquote-bg);
            padding: 8px 16px;
            margin: 0.5em 0;
            border-radius: 0 4px 4px 0;
        }

        .tiptap-editor code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
        }

        .tiptap-editor pre {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            margin: 0.5em 0;
            overflow-x: auto;
        }
        .tiptap-editor pre code {
            background: none;
            padding: 0;
            font-size: 0.9em;
        }

        .tiptap-editor img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 0.5em 0;
            display: block;
            loading: lazy;
        }

        .tiptap-editor hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 1em 0;
        }

        .tiptap-editor strong { font-weight: 700; }
        .tiptap-editor em { font-style: italic; }
        .tiptap-editor u { text-decoration: underline; }
        .tiptap-editor s { text-decoration: line-through; }

        /* Collaboration Cursor */
        .collaboration-cursor__caret {
            border-left: 1px solid #0d0d0d;
            border-right: 1px solid #0d0d0d;
            margin-left: -1px;
            margin-right: -1px;
            pointer-events: none;
            position: relative;
            word-break: normal;
        }

        .collaboration-cursor__label {
            border-radius: 3px 3px 3px 0;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            left: -1px;
            line-height: normal;
            padding: 2px 6px;
            position: absolute;
            top: -1.4em;
            user-select: none;
            white-space: nowrap;
        }

        /* Bubble Menu */
        .bubble-menu {
            background: var(--toolbar-bg);
            border: 1px solid var(--toolbar-border);
            border-radius: 8px;
            box-shadow: 0 2px 12px var(--toolbar-shadow);
            display: flex;
            padding: 4px;
            gap: 2px;
            position: absolute;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.15s, visibility 0.15s;
        }

        .bubble-menu.is-active {
            opacity: 1;
            visibility: visible;
        }

        .bubble-menu button {
            background: none;
            border: none;
            border-radius: 4px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 8px;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .bubble-menu button:hover { background: var(--bg-hover); }
        .bubble-menu button.is-active { background: var(--accent-color); color: #fff; }

        .bubble-menu .separator {
            width: 1px;
            background: var(--border-color);
            margin: 4px 2px;
        }

        @media (max-width: 768px) {
            :root { --sidebar-width: 100%; }
            .app { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 100vh;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                flex-shrink: 0;
            }
            .app.editor-active .sidebar { display: none; }
            .app.editor-active .editor-container { display: flex; }
            .editor-container { display: none; }
            .btn-back { display: inline-flex; }
            .note-item-preview { display: none; }
            .editor-content { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">轻记</h1>
                <button class="dark-toggle" id="darkToggle" title="切换暗色模式">🌙</button>
            </div>
            <div class="sidebar-actions">
                <button class="btn btn-primary" id="newNoteBtn">
                    <span>+</span> 新建笔记
                </button>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索笔记...">
            </div>
            <div class="notes-list" id="notesList"></div>
        </aside>
        <main class="editor-container" id="editorContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">📝</div>
                <div class="empty-state-text">选择一个笔记开始编辑</div>
                <div class="empty-state-hint">或点击上方"新建笔记"创建新笔记</div>
            </div>
            <div class="editor-wrapper" id="editorWrapper" style="display: none; flex-direction: column; flex: 1;">
                <div class="editor-header">
                    <button class="btn-icon btn-back" id="backBtn" title="返回列表">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <input type="text" class="editor-title-input" id="noteTitle" placeholder="无标题笔记">
                    <span class="save-indicator" id="saveIndicator"></span>
                    <span id="onlineCount" class="online-count"></span>
                    <button class="btn-icon" id="deleteNoteBtn" title="删除笔记">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>
                <div class="editor-content" id="editorContent"></div>
            </div>
        </main>
    </div>

    <div class="bubble-menu" id="bubbleMenu">
        <button data-action="bold" title="粗体"><b>B</b></button>
        <button data-action="italic" title="斜体"><i>I</i></button>
        <button data-action="underline" title="下划线"><u>U</u></button>
        <button data-action="strike" title="删除线"><s>S</s></button>
        <button data-action="code" title="行内代码">&lt;&gt;</button>
        <div class="separator"></div>
        <button data-action="h2" title="标题2">H2</button>
        <button data-action="h3" title="标题3">H3</button>
        <div class="separator"></div>
        <button data-action="bulletList" title="无序列表">• 列表</button>
        <button data-action="orderedList" title="有序列表">1. 列表</button>
        <button data-action="blockquote" title="引用">❝</button>
        <button data-action="codeBlock" title="代码块">{ }</button>
    </div>

    <script type="module" src="/chunks/vendor-B8nAkUKh.js"></script>
    <script type="module" src="/chunks/client-CC43d-IH.js"></script>
</body>
</html>
